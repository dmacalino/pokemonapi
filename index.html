<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokedex</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="logo">Pokédex</h1>

      <div class="filters">
        <button class="filter-btn" data-type="all">Ver todos</button>
        <button class="filter-btn normal" data-type="normal">Normal</button>
        <button class="filter-btn fire" data-type="fire">Fire</button>
        <button class="filter-btn water" data-type="water">Water</button>
      </div>
    </header>

    <main>
      <section id="pokemon-container" class="pokemon-container"></section>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
