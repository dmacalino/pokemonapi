<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="logo">Pokédex</h1>

      <div class="filters">
        <button class="filter-btn all active" data-type="all">VER TODOS</button>
        <button class="filter-btn normal" data-type="normal">NORMAL</button>
        <button class="filter-btn fire" data-type="fire">FIRE</button>
        <button class="filter-btn water" data-type="water">WATER</button>
      </div>
    </header>

    <main class="content-area">
      <section id="pokemon-container" class="pokemon-container"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
